components:
  schemas:
    ABCD:
      properties:
        a:
          format: double
          type: number
        b:
          format: double
          type: number
        c:
          format: double
          type: number
        d:
          format: double
          type: number
      type: object
    ABCDImpl:
      description: Energistics standard parameterization y = (A+Bx)/(C+Dx)
      properties:
        a:
          description: Coefficient A in the Energistics unit parameterization y = (A+Bx)/(C+Dx)
          format: double
          type: number
        b:
          description: Coefficient B in the Energistics unit parameterization y = (A+Bx)/(C+Dx)
          format: double
          type: number
        c:
          description: Coefficient C in the Energistics unit parameterization y = (A+Bx)/(C+Dx)
          format: double
          type: number
        d:
          description: Coefficient D in the Energistics unit parameterization y = (A+Bx)/(C+Dx)
          format: double
          type: number
      type: object
    Acl:
      properties:
        owners:
          items:
            type: string
          type: array
        viewers:
          items:
            type: string
          type: array
      type: object
    Action:
      description: Represents a model for Action
      properties:
        contactEmail:
          example: abc@test.com
          type: string
        createdOnEpoch:
          format: date-time
          type: string
        description:
          example: This action launches the Petrel projects landing page that holds the selected data.
          type: string
        filter:
          $ref: '#/components/schemas/Filter'
        id:
          example: petrel-launch-project
          type: string
        img:
          example: https://mycdn.com/img.png
          type: string
        name:
          example: Petrel Project
          type: string
        url:
          example: https://myapp.osdu.com/action/{type}/{id}
          type: string
      type: object
    AddMemberDto:
      description: Represents a model to add a member
      properties:
        email:
          description: Email Id of the member
          minLength: 1
          type: string
        role:
          description: Role of the member
          enum:
          - MEMBER
          - OWNER
          type: string
      required:
      - role
      type: object
    AggregationResponse:
      properties:
        count:
          format: int64
          type: integer
        key:
          type: string
      type: object
    AliasEntity:
      properties:
        aliasId:
          type: string
        userId:
          type: string
      type: object
    Ancestry:
