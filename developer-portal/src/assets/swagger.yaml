  /api/storage/v2/records:
    patch:
      description: "The API represents the patch update mechanism for records. It allows updating multiple records in one\
        \ request. The API supports metadata update only (Legal Tags, ACLs and Tags) if the request body media type is `application/json`.\
        \ The API supports metadata and data update (Legal Tags, ACLs, Tags, Ancestry, Kind, Meta and Data) if the request\
        \ body media type is `application/json-patch+json`. Please choose the appropriate media type from the Request body\
        \ dropdown. The currently supported operations are replace, add, and remove. \nRequired roles: `users.datalake.editors`\
        \ or `users.datalake.admins`."
      operationId: storage_updateRecordsMetadata
      parameters:
      - description: x-collaboration
        in: header
        name: x-collaboration
        required: false
        schema:
          type: string
      - description: Tenant Id
        in: header
        name: data-partition-id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordBulkUpdateParam'
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/PatchRecordsRequestModel'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/PatchRecordsResponse'
                - $ref: '#/components/schemas/BulkUpdateRecordsResponse'
          description: Records updated successfully.
        '206':
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/PatchRecordsResponse'
                - $ref: '#/components/schemas/BulkUpdateRecordsResponse'
          description: Records updated successful partially.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: User not authorized to perform the action.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: Internal Server Error
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: Bad Gateway
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
          description: Service Unavailable
      security:
      - Authorization: []
      summary: Modify record data and/or metadata attributes using patch operations
      tags:
      - Storage
    put:
      description: "The API represents the main injection mechanism into the Data Ecosystem. \nIt allows records creation\
        \ and/or update.When no record id is provided or when the provided id is not already present in the Data Ecosystem\
        \ then a new record is created. \n If the id is related to an existing record in the Data Ecosystem then an update\
        \ operation takes place and a new version of the record is created."
      operationId: storage_createOrUpdateRecords
      parameters:
      - description: x-collaboration
        in: header
        name: x-collaboration
        required: false
        schema:
          type: string
      - description: Skip duplicates when updating records with the same value.
        in: query
        name: skipdupes
        required: false
        schema:
          type: boolean
      - description: Tenant Id
        in: header
        name: data-partition-id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
