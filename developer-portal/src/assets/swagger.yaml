          type: string
      - description: The scope or schema visibility specification
        example: INTERNAL
        in: query
        name: scope
        required: false
        schema:
          type: string
      - description: if True, only return the latest version
        example: 'True'
        in: query
        name: latestVersion
        required: false
        schema:
          type: string
      - description: maximum number of schema records to return
        example: 10
        in: query
        name: limit
        required: false
        schema:
          maximum: 100
