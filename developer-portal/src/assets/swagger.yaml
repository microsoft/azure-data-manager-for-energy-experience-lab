  /api/dataset/v1/retrievalInstructions:
    get:
      description: "Generate retrieval instructions (Eg - Signed URLs) for single dataset. \nRequired roles: `service.dataset.viewers`."
      operationId: dataset_retrievalInstructions
      parameters:
      - description: Dataset registry id
        example: opendes:dataset--File.Generic:8118591ee2
        in: query
        name: id
        required: true
        schema:
          type: string
      - description: The Time for which Signed URL to be valid. Accepted Regex patterns are "^[0-9]+M$", "^[0-9]+H$", "^[0-9]+D$"
          denoting Integer values in Minutes, Hours, Days respectively. In absence of this parameter the URL would be valid
          for 1 Hour.
        example: 5M
        in: query
        name: expiryTime
        required: false
        schema:
          pattern: \d+([mhd]|[MHD])$
          type: string
      - description: Tenant Id
        in: header
        name: data-partition-id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/RetrievalInstructionsResponse'
          description: OK
        '400':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: Bad Request
        '401':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: Unauthorized
        '403':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: User not authorized to perform the action.
        '404':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: Not Found
        '500':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: Internal Server Error
        '502':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: Bad Gateway
        '503':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppError'
          description: Service Unavailable
      security:
      - Authorization: []
      summary: Generate retrieval instructions
      tags:
      - Dataset
    post:
